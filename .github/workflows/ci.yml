name: Python CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        shell: pwsh
        run: ruff check .

      - name: Type check
        shell: pwsh
        run: pyright src/run_hy8

      - name: Test
        shell: pwsh
        run: python -m pytest --cov=src/run_hy8 --cov-report=xml
